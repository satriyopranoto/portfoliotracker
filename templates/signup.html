{% extends 'base.html' %}

{% block title %}Sign Up - Portfolio Tracker{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto;">
    <h2>✍️ Sign Up</h2>
    <form method="POST" action="{{ url_for('auth.signup') }}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: #666;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #1a237e; font-weight: 600;">Login here</a>
    </p>
</div>
{% endblock %}
